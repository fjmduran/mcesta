<div class="container">
    <app-spinner *ngIf="spinnerOn"></app-spinner>
    <div *ngIf="!spinnerOn">
        <div class="enunciado">Cesta: <b>{{cesta.nombre}}</b></div>        
        <div *ngFor="let p of pendientes" class="mat-elevation-z5 containerGroup">
            <div [ngStyle]="Tacha(p)">
                {{p.nombre}}
            </div>
            <div style="text-align: right">
                <button class='btnOpen' mat-mini-fab (click)="CheckProduct(p)" [ngStyle]="ColorChange(p)">
                    <mat-icon>check</mat-icon>
                </button>
            </div>
        </div>
    </div>
    <empty-list [msg]="msgEmpty" *ngIf='pendientes.length==0'></empty-list>    
</div>
<button class="btnClean mat-elevation-z15" mat-fab *ngIf="prodChecked.length>0" (click)="cleanCesta()">
    <mat-icon>done_all</mat-icon>
</button>
<button class="FAB btnAdd mat-elevation-z15" mat-fab (click)="addProduct()">
    <mat-icon>add_shoping_car</mat-icon>
</button>
