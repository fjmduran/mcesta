<div class="filterTxt">
  <mat-form-field appearance="outline">
    <mat-label>Filtrar</mat-label>
    <input
      type="text"
      matInput
      placeholder="Filtrar"
      autocomplete="off"
      (keyup)="Search($event)"
    />
  </mat-form-field>
</div>

<div mat-dialog-content>
  <div class="bodyDialog">
    <div *ngFor="let p of productos" class="mat-elevation-z5 containerProduct">
      {{ p.nombre }}
      <div class="check">
        <mat-checkbox
          type="checkbox"
          color="primary"
          [(checked)]="p.pendiente"
          (change)="OnChange($event, p)"
        ></mat-checkbox>
      </div>
    </div>
  </div>
</div>
<div mat-dialog-actions style="float: right">
  <button class="btn btnCerrar" mat-button mat-dialog-close>Cerrar</button>
  <button class="btn btnSave" mat-button mat-dialog-close (click)="onSave()">
    Guardar
  </button>
</div>
